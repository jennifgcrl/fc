name: "Update lock file"
on:
  schedule:
    - cron: "43 21 * * *"
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate a GitHub App token
        uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Git author
        run: |
          git config user.name 'GitHub Actions'
          git config user.email 'noreply@github.com'

      - name: Update lock file
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          until="$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)"
          overrides=()

          for name in $(jq -r '.nodes.root.inputs | values[]' flake.lock); do
            type="$(jq -r ".nodes[\"$name\"].original.type" flake.lock)"
            [[ "$type" == "github" ]] || continue

            owner="$(jq -r ".nodes[\"$name\"].original.owner" flake.lock)"
            repo="$(jq -r ".nodes[\"$name\"].original.repo" flake.lock)"
            ref="$(jq -r ".nodes[\"$name\"].original.ref // empty" flake.lock)"

            rev="$(gh api "repos/${owner}/${repo}/commits?sha=${ref:-HEAD}&until=${until}&per_page=1" --jq '.[0].sha')"
            if [[ -z "$rev" ]]; then
              echo "::warning::No commits found for ${name} (${owner}/${repo}) before ${until}, skipping"
              continue
            fi
            overrides+=(--override-input "$name" "github:${owner}/${repo}/${rev}")
          done

          nix flake update "${overrides[@]}" --commit-lock-file

      - name: Get commit message
        id: commit
        run: |
          delimiter="$(openssl rand -hex 16)"
          echo "message<<${delimiter}" >> "${GITHUB_OUTPUT}"
          git log -1 --pretty=%B >> "${GITHUB_OUTPUT}"
          echo "${delimiter}" >> "${GITHUB_OUTPUT}"

          delimiter="$(openssl rand -hex 16)"
          echo "pr<<${delimiter}" >> "${GITHUB_OUTPUT}"
          git log -1 --pretty=%B | tail +3 | awk -f ./.github/flake-to-markdown.awk >> "${GITHUB_OUTPUT}"
          echo "${delimiter}" >> "${GITHUB_OUTPUT}"

      # Undo the commit as the action will do a new commit with signing using the GH API
      - name: Undo the latest commit
        run: git reset --soft "${{ github.sha }}"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8.1.1
        id: create-pr
        with:
          token: "${{ steps.generate-token.outputs.token }}"
          title: "Automated Flake update"
          body: "${{ steps.commit.outputs.pr }}"
          commit-message: "${{ steps.commit.outputs.message }}"
          add-paths: |
            flake.lock
          delete-branch: true
          sign-commits: true

      - name: Merge
        if: steps.create-pr.outputs.pull-request-operation == 'created'
        run: |
          gh pr merge --auto --merge ${{ steps.create-pr.outputs.pull-request-number }}
        env:
          GITHUB_TOKEN: "${{ steps.generate-token.outputs.token }}"
